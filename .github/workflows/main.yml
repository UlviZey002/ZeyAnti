name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lazımsız yenilənmələrin qarşısını al və kilidlə
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git unzip zip openjdk-17-jdk
          # Sistem özbaşına yeniləyib xəta verməsin deyə məhz stabil versiyaları dondururuq
          python -m pip install "pip<24.0" "setuptools<70.0.0"
          pip install buildozer "cython<3.0.0" virtualenv

      - name: Build with Buildozer
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK: ""
        run: |
          buildozer init
          # Sənin loqon və adın üçün olan ayarlar
          sed -i 's/title = My Application/title = ZeyAnti/g' buildozer.spec
          sed -i 's/package.name = myapp/package.name = zeyanti/g' buildozer.spec
          sed -i 's|#icon.filename = %(source.dir)s/data/icon.png|icon.filename = %(source.dir)s/logo.png|g' buildozer.spec
          
          # Kivy-nin xətasız 2.3.0 versiyasını və ən sağlam Android yığıcısını (master) məcbur edirik
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0/g' buildozer.spec
          echo "p4a.branch = master" >> buildozer.spec
          
          export BUILDOZER_WARN_ON_ROOT=0
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeyAnti-APK
          path: bin/*.apk
